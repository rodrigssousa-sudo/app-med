      return classes.filter(Boolean).join(" ");
    }

    // -- Utilities and Helper functions --
    // These match the logic extracted from the provided source
    function formatDate(value) {
      if (!value) return "—";
      return new Intl.DateTimeFormat("pt-BR", {
        day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit",
      }).format(new Date(value));
    }

    function extractFirstNumberFromText(text) {
      const raw = String(text || "");
      let started = false;
      let out = "";
      for (let i = 0; i < raw.length; i += 1) {
        const ch = raw[i];
        const isDigit = ch >= "0" && ch <= "9";
        const isDecimal = ch === "," || ch === ".";
        if (isDigit || (started && isDecimal)) {
          started = true;
          out += ch === "," ? "." : ch;
        } else if (started) {
          break;
        }
      }
      return out || "";
    }

    function normalizeLabTextLine(line) {
      return String(line || "").toLowerCase().normalize("NFD").split("")
        .filter((ch) => ch < "\u0300" || ch > "\u036f").join("")
        .replaceAll(":", " ").replaceAll("=", " ").replaceAll(";", " ").trim();
    }

    function findLabValue(lines, labels) {
      const found = lines.find((line) => labels.some((label) => line.includes(label)));
      return found ? extractFirstNumberFromText(found) : "";
    }

    function extractLabResultsFromSimpleText(rawText) {
      const lines = String(rawText || "").split("\n").map(normalizeLabTextLine).filter(Boolean);
      const result = {
        hemoglobina: findLabValue(lines, ["hemoglobina", " hb ", "hb ", " hb"]),
        hematocrito: findLabValue(lines, ["hematocrito", "hto", " hct"]),
        leucocitos: findLabValue(lines, ["leucocitos", "leucocito", "globulos blancos", "wbc"]),
        plaquetas: findLabValue(lines, ["plaquetas", "plaq", "platelets"]),
        creatinina: findLabValue(lines, ["creatinina", "creat", "crea"]),
        urea: findLabValue(lines, ["urea", "bun"]),
        sodio: findLabValue(lines, ["sodio", "na ", " na", "natremia"]),
        potassio: findLabValue(lines, ["potassio", "potasio", "k ", " k", "kalemia"]),
        glicose: findLabValue(lines, ["glicose", "glucose", "glucemia", "glicemia"]),
        pcr: findLabValue(lines, ["proteina c reativa", "pcr", "crp"]),
        tgo: findLabValue(lines, ["tgo", "ast"]),
        tgp: findLabValue(lines, ["tgp", "alt"]),
        bilirrubina: findLabValue(lines, ["bilirrubina total", "bt ", "bil total"]),
        inr: findLabValue(lines, ["inr", "rni"]),
      };
      return Object.entries(result)
        .filter(([, value]) => Boolean(value))
        .reduce((acc, [key, value]) => ({ ...acc, [key]: value }), {});
    }

    function formatExtractedLabs(labs) {
      const labels = {
        hemoglobina: "Hemoglobina", hematocrito: "Hematócrito", leucocitos: "Leucócitos",
        plaquetas: "Plaquetas", creatinina: "Creatinina", urea: "Urea", sodio: "Sódio/Na+",
        potassio: "Potássio/K+", glicose: "Glicose", pcr: "PCR", tgo: "TGO/AST", tgp: "TGP/ALT",
        bilirrubina: "Bilirrubina total", inr: "INR/RNI",
      };
      const entries = Object.entries(labs || {});
      if (!entries.length) return "";
      return entries.map(([key, value]) => `${labels[key] || key}: ${value}`).join("\n");
    }

    function loadTesseractJs() {
      if (typeof window === "undefined") return Promise.reject(new Error("Navegador indisponível."));
      if (window.Tesseract) return Promise.resolve(window.Tesseract);
      return new Promise((resolve, reject) => {
        const existing = document.querySelector("script[data-medcases-ocr='true']");
        if (existing) {
          existing.addEventListener("load", () => resolve(window.Tesseract));
          existing.addEventListener("error", () => reject(new Error("Falha ao carregar OCR.")));
          return;

        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
        script.async = true;
        script.dataset.medcasesOcr = "true";
        script.onload = () => resolve(window.Tesseract);
        script.onerror = () => reject(new Error("Falha ao carregar OCR pela internet."));
        document.body.appendChild(script);

      return `

        script.onload = resolve;

      win.document.close();

    async function downloadClinicalReport(caseItem, type = "complete", format = "pdf") {
      if (!caseItem) return;
      const wrapper = createReportNode(caseItem, type);
      try {
        await loadExternalScript("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js");
        const node = wrapper.querySelector("#clinicalReportExport");
        const canvas = await window.html2canvas(node, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
        if (format === "png") {
          const link = document.createElement("a");
          link.href = canvas.toDataURL("image/png");
          link.download = getReportFileName(caseItem, type, "png");
          link.click();
          return;
        }
        await loadExternalScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF("p", "mm", "a4");
        const imgData = canvas.toDataURL("image/png");
        const pageWidth = 210;
        const pageHeight = 297;
        const imgWidth = pageWidth;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        let heightLeft = imgHeight;
        let position = 0;
        pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
        while (heightLeft > 0) {
          position = heightLeft - imgHeight;
          pdf.addPage();
          pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
          heightLeft -= pageHeight;
        }
        pdf.save(getReportFileName(caseItem, type, "pdf"));
      } catch (error) {
        console.error("Erro ao gerar relatório:", error);
        openClinicalReportPreview(caseItem, type);
      } finally {
        wrapper.remove();
      }
    }

    function makeId(prefix) { return `${prefix}-${Math.random().toString(36).slice(2, 10)}`; }
    function num(value) { const parsed = Number(String(value || "").replace(",", ".")); return Number.isFinite(parsed) ? parsed : 0; }
    function calcBMI(weight, heightCm) { const w = num(weight); const h = num(heightCm) / 100; if (!w || !h) return null; return w / (h * h); }
    function roundSmart(value) { if (!Number.isFinite(value)) return "—"; if (value >= 100) return Math.round(value).toString(); return Math.round(value * 10) / 10; }
    
    function calculateClCr(patient, creatinine) {
      const { age, weight, sex } = patient || {};
      const cr = num(creatinine); const a = num(age); const w = num(weight);
      if (!cr || !a || !w) return null;
      let clcr = ((140 - a) * w) / (72 * cr);
      if (sex === "Feminino" || sex === "Femenino") clcr *= 0.85;
      return roundSmart(clcr);
    }
    
    function getRenalStatus(clcr) {
      const value = Number(clcr);
      if (!Number.isFinite(value)) return { label: "Não calculado", tone: "slate", alert: "Informe creatinina para estimar ClCr." };
      if (value < 30) return { label: "Grave", tone: "red", alert: "Alto risco: muitos fármacos exigem ajuste, troca ou contraindicação." };
      if (value < 50) return { label: "Reduzido", tone: "amber", alert: "Requer revisão de dose/intervalo para fármacos renais." };
      if (value < 90) return { label: "Leve redução", tone: "blue", alert: "Avaliar ajuste conforme fármaco e protocolo." };
      return { label: "Preservado", tone: "emerald", alert: "Sem alerta renal automático pela fórmula." };
    }

    function safeJsonRead(key, fallback) {
      try { const raw = window.localStorage?.getItem(key); return raw ? JSON.parse(raw) : fallback; } catch { return fallback; }
    }
    function safeJsonWrite(key, value) {
      try { window.localStorage?.setItem(key, JSON.stringify(value)); } catch {}
    }
    function getStorageStatus() {
      if (typeof window === "undefined") return "local"; return window.localStorage?.getItem("medcases_pwa_status") || "local";
    }
    
    async function forceReloadApp() {
      if (typeof window === "undefined") return;
      const stamp = Date.now();
      try { window.localStorage?.setItem("medcases_last_manual_reload", String(stamp)); window.localStorage?.setItem("medcases_pwa_status", "manual-reload"); } catch {}
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
      } catch (error) { console.warn(error); }
      try {
        if (window.caches?.keys) {
          const cacheNames = await window.caches.keys();
          await Promise.all(cacheNames.map((name) => window.caches.delete(name)));
        }
      } catch (error) { console.warn(error); }
      const cleanPath = window.location.pathname || "/";
      window.location.assign(`${cleanPath}?appReload=${stamp}`);
      window.setTimeout(() => { try { window.location.reload(); } catch {} }, 450);
    }
    
    function registerOfflineMode() {
      if (typeof window === "undefined") return;
      const setStatus = (status) => { try { window.localStorage?.setItem("medcases_pwa_status", status); window.dispatchEvent(new CustomEvent("medcases:pwa-status", { detail: status })); } catch {} };
      if (!("serviceWorker" in navigator)) { setStatus("local-only"); return; }
      navigator.serviceWorker.register("/service-worker.js").then(() => setStatus("pwa-ready")).catch(() => setStatus("local-fallback"));
    }

    function useConnectivityStatus() {
      const [isOnline, setIsOnline] = useState(typeof navigator === "undefined" ? true : navigator.onLine);
