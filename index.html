<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>MedCases Pro</title>
  <meta name="theme-color" content="#062015" />
  <style>
    :root{
      --bg:#f5faf7;--card:#fff;--ink:#10201a;--muted:#6b7a72;--line:rgba(15,35,27,.10);
      --green:#0f8f61;--green2:#0b6b49;--dark:#07152f;--soft:#ecfdf5;--red:#dc2626;--amber:#d97706;
      --shadow:0 18px 48px rgba(15,35,27,.10);--radius:24px;
    }
    *{box-sizing:border-box} html,body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
    body{padding-bottom:86px}.app{max-width:480px;margin:0 auto;min-height:100vh}.top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.86);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
    .topin{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}.brand{display:flex;align-items:center;gap:10px}.logo{width:43px;height:43px;border-radius:18px;background:linear-gradient(145deg,#062015,#0f8f61);display:grid;place-items:center;color:white;box-shadow:0 12px 30px rgba(15,143,97,.24);font-weight:950}.brand h1{font-size:17px;margin:0;letter-spacing:-.05em}.brand p{font-size:11px;color:var(--muted);margin:1px 0 0;font-weight:700}.pill{border:1px solid var(--line);background:white;border-radius:999px;padding:8px 10px;font-size:11px;font-weight:900;color:var(--green2)}
    main{padding:16px}.hero{position:relative;overflow:hidden;border-radius:32px;background:linear-gradient(135deg,#07152f,#062015 55%,#0f8f61);color:white;padding:22px;box-shadow:var(--shadow)}.hero:after{content:"";position:absolute;right:-70px;top:-80px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.13);filter:blur(2px)}.hero>*{position:relative}.hero small{font-weight:950;text-transform:uppercase;letter-spacing:.18em;color:#bdf8df}.hero h2{margin:8px 0 8px;font-size:36px;line-height:.95;letter-spacing:-.08em}.hero p{margin:0;color:rgba(255,255,255,.78);font-size:14px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}.stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:10px;text-align:center}.stat b{display:block;font-size:20px}.stat span{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#d7ffee;font-weight:900}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card,.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 8px 24px rgba(15,35,27,.055)}.card{padding:16px}.action{border:0;text-align:left;min-height:120px;cursor:pointer}.ico{width:44px;height:44px;border-radius:17px;background:#10201a;color:white;display:grid;place-items:center;font-weight:950;margin-bottom:12px}.card h3{margin:0;font-size:16px;letter-spacing:-.04em}.card p{margin:4px 0 0;color:var(--muted);font-size:12px;font-weight:650}.panel{overflow:hidden;margin-top:14px}.panelHead{padding:15px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(255,255,255,.72)}.panelHead h2{margin:0;font-size:19px;letter-spacing:-.05em}.panelHead p{margin:2px 0 0;color:var(--muted);font-size:12px;font-weight:700}.panelBody{padding:16px}.btn{height:44px;border:0;border-radius:18px;background:#10201a;color:white;font-weight:950;padding:0 14px;cursor:pointer;box-shadow:0 10px 24px rgba(15,35,27,.12)}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.light{background:#f1fbf6;color:var(--green2);border:1px solid #d9f2e6;box-shadow:none}.btn.full{width:100%}.btn.small{height:34px;border-radius:14px;font-size:11px;padding:0 10px}.row{display:flex;gap:8px;align-items:center}.row>*{flex:1}.field{margin-bottom:12px}.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:950;color:var(--muted);margin:0 0 6px}input,textarea,select{width:100%;border:1px solid #dfe8e2;background:#fff;border-radius:18px;min-height:44px;padding:11px 12px;color:var(--ink);outline:none;font:inherit;font-size:14px}textarea{min-height:92px;resize:vertical}input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(15,143,97,.12)}.search{position:relative}.search input{padding-left:40px}.search:before{content:"⌕";position:absolute;left:15px;top:10px;color:var(--green);font-weight:950}.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}.chip{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:9px 12px;font-size:12px;font-weight:950;color:var(--muted);cursor:pointer}.chip.active{background:#10201a;color:white;border-color:#10201a}.list{display:grid;gap:10px}.item{border:1px solid var(--line);background:#fff;border-radius:20px;padding:13px;cursor:pointer}.item.active{border-color:var(--green);box-shadow:0 0 0 4px rgba(15,143,97,.12)}.item h4{margin:0;font-size:15px;letter-spacing:-.03em}.item p{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.35}.tag{display:inline-flex;align-items:center;border-radius:999px;background:#f1fbf6;color:var(--green2);border:1px solid #d9f2e6;padding:5px 8px;font-size:10px;font-weight:950;margin:0 5px 5px 0}.danger{background:#fff1f2!important;border-color:#fecdd3!important;color:#9f1239!important}.amber{background:#fffbeb!important;border-color:#fde68a!important;color:#92400e!important}.blue{background:#eff6ff!important;border-color:#bfdbfe!important;color:#1d4ed8!important}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mini .box{border:1px solid var(--line);background:#f8faf9;border-radius:18px;padding:10px}.mini .box span{display:block;font-size:10px;color:var(--muted);font-weight:950;text-transform:uppercase}.mini .box b{font-size:14px}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line)}.tabsIn{max-width:480px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:8px}.tab{border:0;background:transparent;border-radius:16px;padding:8px 2px;color:var(--muted);font-size:9px;font-weight:950;cursor:pointer}.tab b{display:block;font-size:14px;margin-bottom:2px}.tab.active{background:#10201a;color:white}.login{min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% -10%,rgba(15,143,97,.22),transparent 34%),linear-gradient(180deg,#fbfffd,#edf7f1)}.loginBox{width:100%;max-width:400px;background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.9);border-radius:32px;box-shadow:var(--shadow);padding:20px}.empty{text-align:center;color:var(--muted);padding:30px;border:1px dashed var(--line);border-radius:22px;background:#f8faf9}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);z-index:99;background:#10201a;color:white;padding:12px 18px;border-radius:18px;box-shadow:var(--shadow);font-size:13px;font-weight:850;max-width:90%;text-align:center}.hidden{display:none!important}.photo{width:100%;max-height:260px;object-fit:contain;border-radius:18px;background:#10201a}.report{font-family:Arial,sans-serif;color:#0f172a;background:white;padding:30px}.report h1{color:#064e3b}.reportSec{border:1px solid #e2e8f0;border-radius:14px;padding:12px;margin:10px 0}.reportSec h2{font-size:13px;text-transform:uppercase;color:#047857}.voiceOn{animation:pulse 1s infinite}@keyframes pulse{50%{opacity:.55}}
    @media print{body{background:white;padding:0}.top,.tabs,.noPrint{display:none!important}.app{max-width:none}.panel,.card,.hero{box-shadow:none}}
  </style>
</head>

function uid(p='id'){return p+'_'+Math.random().toString(36).slice(2,10)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}

function toast(m){state.toast=m;render();setTimeout(()=>{state.toast=null;render()},2400)}
function setTab(t){state.tab=t;save();render()}function selectedCase(){return state.cases.find(c=>c.id==state.selCase)||state.cases[0]}function selectedDrug(){return state.drugs.find(d=>d.id==state.selDrug)||state.drugs[0]}
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function firstNum(s){let m=String(s||'').replace(',','.').match(/[0-9]+(\.[0-9]+)?/);return m?Number(m[0]):0}
function clcr(p){let cr=Number(String(p.cr||p.creatinine||'').replace(',','.')),age=+p.age,w=+p.weight;if(!cr||!age||!w)return null;let v=((140-age)*w)/(72*cr);if((p.sex||'').startsWith('F'))v*=.85;return Math.round(v*10)/10}
function calcDose(d,p){let w=+p.weight||0;if(!d)return '—';if(/mcg\/kg\/min/i.test(d.dose)&&w){let a=d.dose.match(/([0-9]+[,.]?[0-9]*)\s*[–-]\s*([0-9]+[,.]?[0-9]*)\s*mcg\/kg\/min/i);if(a)return `${Math.round(w*Number(a[1].replace(',','.'))*10)/10}–${Math.round(w*Number(a[2].replace(',','.'))*10)/10} mcg/min`}
if(/mg\/kg/i.test(d.dose)&&w){let n=firstNum(d.dose);if(n)return `${Math.round(w*n*10)/10} mg por dose`}
return d.dose}
function riskClass(r){return norm(r).includes('alto')?'danger':norm(r).includes('moderado')?'amber':'blue'}
function checkInteractions(drugId, medsText){let meds=String(medsText||'').split(/[,;\n]/).map(x=>x.trim()).filter(Boolean);let alerts=[];meds.forEach(m=>{let md=state.drugs.find(d=>norm(m).includes(norm(d.n).split(' ')[0])||norm(d.n).includes(norm(m)));if(!md||md.id==drugId)return;interactions.forEach(r=>{if((r[0]==drugId&&r[1]==md.id)||(r[1]==drugId&&r[0]==md.id))alerts.push({med:m,risk:r[2],txt:r[3],act:r[4]})})});return alerts}

function saveCaseForm(e){e.preventDefault();let id=state.editing||uid('case');let old=state.cases.find(c=>c.id==id)||{};let c={...old,id,createdAt:old.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString(),owner:state.user.name,patientCode:val('f_patientCode'),bed:val('f_bed'),age:val('f_age'),sex:val('f_sex'),weight:val('f_weight'),height:val('f_height'),title:val('f_title'),priority:val('f_priority'),diagnosis:val('f_diagnosis'),history:val('f_history'),currentMeds:val('f_currentMeds'),treatment:val('f_treatment'),exams:val('f_exams'),labText:val('labText'),labs:window.currentLabs||old.labs||[],photos:[...(old.photos||[]),...tempPhotos],evolutions:old.evolutions||[]};state.cases=state.cases.filter(x=>x.id!=id);state.cases.unshift(c);state.selCase=id;state.editing=null;tempPhotos=[];save();toast('Caso salvo.');setTab('hist')}
function newCase(){state.editing=null;tempPhotos=[];setTab('case')}function editCase(id){state.editing=id;setTab('case')}function delCase(id){if(confirm('Excluir este caso?')){state.cases=state.cases.filter(c=>c.id!=id);save();render()}}
function histScreen(){let q=norm(val('searchHist')||state.histQ||'');let list=state.cases.filter(c=>!q||norm([c.title,c.patientCode,c.diagnosis,c.history,c.owner,c.bed].join(' ')).includes(q));return `<section class="panel"><div class="panelHead"><div><h2>Histórico</h2><p>Casos salvos localmente</p></div><span class="tag">${list.length}</span></div><div class="panelBody"><div class="search"><input id="searchHist" value="${esc(state.histQ||'')}" oninput="state.histQ=this.value;render()" placeholder="Buscar paciente, diagnóstico, data..."></div><div class="list" style="margin-top:12px">${list.length?list.map(c=>`<article class="item ${state.selCase==c.id?'active':''}" onclick="state.selCase='${c.id}';save();render()"><span class="tag ${c.priority=='Alto'||c.priority=='Crítico'?'danger':''}">${esc(c.priority||'Moderado')}</span><h4>${esc(c.title||'Caso sem título')}</h4><p>${esc(c.patientCode||'Sem código')} • ${esc(c.bed||'Sem leito')} • ${new Date(c.createdAt).toLocaleString('pt-BR')}</p><p><b>Dx:</b> ${esc(c.diagnosis||'—')}</p><div class="mini" style="margin-top:10px"><div class="box"><span>Idade</span><b>${esc(c.age||'—')}</b></div><div class="box"><span>Evol</span><b>${c.evolutions?.length||0}</b></div><div class="box"><span>Fotos</span><b>${c.photos?.length||0}</b></div></div><div class="row noPrint" style="margin-top:10px"><button class="btn small light" onclick="event.stopPropagation();editCase('${c.id}')">Editar</button><button class="btn small light" onclick="event.stopPropagation();report('${c.id}')">PDF/Print</button><button class="btn small red" onclick="event.stopPropagation();delCase('${c.id}')">Excluir</button></div></article>`).join(''):'<div class="empty">Nenhum caso encontrado.</div>'}</div></div></section>`}
function evoScreen(){let c=selectedCase();return `<section class="panel"><div class="panelHead"><div><h2>Evolução diária</h2><p>Seguimento da internação</p></div><span class="tag">${c?.evolutions?.length||0}</span></div><div class="panelBody">${!c?'<div class="empty">Selecione um paciente.</div>':`<div class="item"><h4>${esc(c.title)}</h4><p>${esc(c.patientCode||'Sem código')} • ${esc(c.bed||'Sem leito')}</p></div>${voiceBox('evo','Ditado de evolução','Fale e mande para subjetivo, sinais vitais ou conduta.')}<form onsubmit="saveEvolution(event)"><div class="row"><div class="field"><label>Data</label><input id="ev_date" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="field"><label>Dia</label><input id="ev_day" placeholder="D2, D3..."></div></div><div class="field"><label>Subjetivo</label><textarea id="ev_s"></textarea></div><div class="field"><label>Sinais vitais / balanço</label><textarea id="ev_v"></textarea></div><div class="field"><label>Exame físico</label><textarea id="ev_e"></textarea></div><div class="field"><label>Laboratório / exames</label><textarea id="ev_l"></textarea></div><div class="field"><label>Conduta</label><textarea id="ev_c"></textarea></div><div class="field"><label>Resposta / plano</label><textarea id="ev_r"></textarea></div><button class="btn green full">Salvar evolução</button></form><div class="list" style="margin-top:14px">${(c.evolutions||[]).map(ev=>`<div class="item"><h4>${esc(ev.day||'Evolução')} • ${esc(ev.date)}</h4>${['s','v','e','l','c','r'].map(k=>ev[k]?`<p><b>${{s:'Subjetivo',v:'Sinais vitais',e:'Exame físico',l:'Labs',c:'Conduta',r:'Resposta'}[k]}:</b> ${esc(ev[k])}</p>`:'').join('')}</div>`).join('')}</div>`}</div></section>`}
function saveEvolution(e){e.preventDefault();let c=selectedCase();if(!c)return;let ev={id:uid('ev'),date:val('ev_date'),day:val('ev_day'),s:val('ev_s'),v:val('ev_v'),e:val('ev_e'),l:val('ev_l'),c:val('ev_c'),r:val('ev_r')};c.evolutions=[ev,...(c.evolutions||[])];c.updatedAt=new Date().toISOString();save();toast('Evolução salva.');render()}
function drugScreen(){let d=selectedDrug();let q=state.drugQ||'';let cat=state.drugCat||'Todos';let cats=['Todos',...new Set(state.drugs.map(d=>d.cat))];let filtered=state.drugs.filter(x=>(cat=='Todos'||x.cat==cat)&&(!q||norm([x.n,x.cls,x.cat,x.via,x.warn].join(' ')).includes(norm(q))));let p={age:val('calc_age')||state.calc?.age||'',sex:val('calc_sex')||state.calc?.sex||'Masculino',weight:val('calc_weight')||state.calc?.weight||'',height:val('calc_height')||state.calc?.height||'',cr:val('calc_cr')||state.calc?.cr||''};let dose=calcDose(d,p),renal=clcr(p);let meds=val('calc_meds')||state.calc?.meds||'';let alerts=checkInteractions(d?.id,meds);return `<section class="panel"><div class="panelHead"><div><h2>Fármacos</h2><p>Base, dose, preparo, interações</p></div><span class="tag">${state.drugs.length}</span></div><div class="panelBody"><div class="search"><input id="drugSearch" value="${esc(q)}" oninput="state.drugQ=this.value;render()" placeholder="Buscar: furosemida, adenosina, morfina..."></div><div class="chips" style="margin-top:10px">${cats.map(c=>`<button class="chip ${cat==c?'active':''}" onclick="state.drugCat='${esc(c)}';render()">${esc(c)}</button>`).join('')}</div><div class="list" style="max-height:310px;overflow:auto;margin-top:8px">${filtered.map(x=>`<div class="item ${d.id==x.id?'active':''}" onclick="state.selDrug='${x.id}';save();render()"><h4>${esc(x.n)}</h4><p>${esc(x.cls)} • ${esc(x.via)}</p><span class="tag">${esc(x.cat)}</span></div>`).join('')}</div></div></section><section class="panel"><div class="panelHead"><div><h2>Calculadora</h2><p>Dose por paciente + função renal</p></div><span class="tag">${esc(d?.via||'')}</span></div><div class="panelBody"><div class="row"><div class="field"><label>Idade</label><input id="calc_age" type="number" value="${esc(p.age)}" oninput="saveCalc()"></div><div class="field"><label>Sexo</label><select id="calc_sex" onchange="saveCalc()"><option ${p.sex=='Masculino'?'selected':''}>Masculino</option><option ${p.sex=='Feminino'?'selected':''}>Feminino</option></select></div></div><div class="row"><div class="field"><label>Peso kg</label><input id="calc_weight" type="number" step="0.1" value="${esc(p.weight)}" oninput="saveCalc()"></div><div class="field"><label>Creatinina</label><input id="calc_cr" type="number" step="0.1" value="${esc(p.cr)}" oninput="saveCalc()"></div></div><div class="field"><label>Medicações atuais</label><textarea id="calc_meds" oninput="saveCalc()">${esc(meds)}</textarea></div><div class="hero" style="border-radius:24px;padding:18px"><small>Dose sugerida</small><h2 style="font-size:25px">${esc(dose||'—')}</h2><p>${esc(d?.n||'')} • ClCr: ${renal?renal+' mL/min':'não calculado'}</p></div>${alerts.length?`<div class="list" style="margin-top:12px">${alerts.map(a=>`<div class="item ${riskClass(a.risk)}"><h4>Risco ${esc(a.risk)} • ${esc(a.med)}</h4><p><b>Interação:</b> ${esc(a.txt)}</p><p><b>Conduta:</b> ${esc(a.act)}</p></div>`).join('')}</div>`:`<div class="item" style="margin-top:12px"><h4>Nenhuma interação importante encontrada na base local.</h4><p>Isso não exclui interações reais. Conferir protocolo institucional/bula.</p></div>`}<div class="item" style="margin-top:12px"><h4>Preparo / administração</h4><p>${esc(d?.prep||'Conferir apresentação e protocolo.')}</p></div><div class="item amber"><h4>Alerta obrigatório</h4><p>${esc(d?.warn||'Validar antes de prescrever.')}</p></div><div class="item"><h4>Efeitos adversos</h4><p>${(d?.ea||[]).map(esc).join(' • ')}</p></div><div class="item"><h4>Interações relevantes</h4><p>${(d?.int||[]).map(esc).join(' • ')}</p></div></div></section>${txScreenMini()}`}
function saveCalc(){state.calc={age:val('calc_age'),sex:val('calc_sex'),weight:val('calc_weight'),cr:val('calc_cr'),meds:val('calc_meds')};save()}
function txScreenMini(){let q=state.txQ||'';let list=state.tx.filter(t=>!q||norm([t.cond,t.cat,t.first,t.scheme].join(' ')).includes(norm(q)));return `<section class="panel"><div class="panelHead"><div><h2>Tratamentos rápidos</h2><p>Protocolos por síndrome</p></div><span class="tag">${list.length}</span></div><div class="panelBody"><div class="search"><input value="${esc(q)}" oninput="state.txQ=this.value;render()" placeholder="Buscar: choque, sepse, IC, asma..."></div><div class="list" style="margin-top:12px">${list.map(t=>`<div class="item"><span class="tag">${esc(t.cat)}</span><h4>${esc(t.cond)}</h4><p><b>1ª linha:</b> ${esc(t.first)}</p><p><b>Esquema:</b> ${esc(t.scheme)}</p><p><b>Monitorar:</b> ${esc(t.mon)}</p><p class="danger" style="border-radius:14px;padding:8px"><b>Alerta:</b> ${esc(t.warn)}</p><div>${(t.drugs||[]).map(id=>{let d=state.drugs.find(x=>x.id==id);return d?`<button class="btn small light" onclick="state.selDrug='${d.id}';state.tab='drugs';save();render()">${esc(d.n)}</button>`:''}).join(' ')}</div></div>`).join('')}</div></div></section>`}
function baseScreen(){return `<section class="panel"><div class="panelHead"><div><h2>Base de dados</h2><p>Adicionar fármacos, tratamentos e backup</p></div><span class="tag">DB</span></div><div class="panelBody"><div class="grid2"><button class="btn light" onclick="exportBackup()">Exportar backup</button><label class="btn light" style="display:grid;place-items:center"><input type="file" accept=".json" style="display:none" onchange="importBackup(event)">Importar backup</label></div><div class="item" style="margin-top:12px"><h4>Novo fármaco por texto</h4><p>Campos: Nome, Classe, Categoria, Via, Dose, Renal, Alerta, Preparo, EA, Interações.</p><textarea id="newDrugText" placeholder="Nome: Pregabalina\nClasse: Dor neuropática\nDose: 75 mg 12/12h..."></textarea><button class="btn green full" style="margin-top:8px" onclick="addDrugText()">Adicionar fármaco</button></div><div class="item"><h4>Novo tratamento por texto</h4><p>Campos: Síndrome, Categoria, Primeira linha, Esquema, Monitorização, Alerta, Fármacos.</p><textarea id="newTxText" placeholder="Síndrome: Crise asmática\nPrimeira linha: Salbutamol + ipratrópio + corticoide..."></textarea><button class="btn green full" style="margin-top:8px" onclick="addTxText()">Adicionar tratamento</button></div><div class="mini"><div class="box"><span>Fármacos</span><b>${state.drugs.length}</b></div><div class="box"><span>Tratamentos</span><b>${state.tx.length}</b></div><div class="box"><span>Casos</span><b>${state.cases.length}</b></div></div><button class="btn red full" style="margin-top:12px" onclick="if(confirm('Resetar base local?')){localStorage.removeItem(DBKEY);location.reload()}">Resetar app</button></div></section>`}
function val(id){let el=document.getElementById(id);return el?el.value:''}
function parseField(txt,names){let lines=String(txt).split('\n');for(let n of names){let l=lines.find(x=>norm(x).startsWith(norm(n)+':'));if(l)return l.split(':').slice(1).join(':').trim()}return''}
function addDrugText(){let t=val('newDrugText');if(!t.trim())return toast('Cole o texto do fármaco.');let name=parseField(t,['Nome','Nombre','Fármaco','Farmaco'])||t.split('\n')[0]||'Fármaco novo';let d={id:'custom_'+uid(),n:name,cat:parseField(t,['Categoria'])||'Personalizado',cls:parseField(t,['Classe','Clase'])||'Classe personalizada',via:parseField(t,['Via','Vía'])||'—',dose:parseField(t,['Dose','Dosis'])||'Individualizar.',max:parseField(t,['Máximo','Maximo'])||'Revisar.',renal:parseField(t,['Renal','Rim'])||'Revisar função renal.',prep:parseField(t,['Preparo','Preparación'])||'Conferir apresentação.',ea:(parseField(t,['EA','Efeitos adversos','Efectos adversos'])||'Revisar EA').split(',').map(x=>x.trim()),int:(parseField(t,['Interações','Interacciones'])||'Revisar interações').split(',').map(x=>x.trim()),warn:parseField(t,['Alerta','Atenção','Warning'])||'Validar protocolo.'};state.drugs.unshift(d);state.selDrug=d.id;save();toast('Fármaco adicionado.');render()}
function addTxText(){let t=val('newTxText');if(!t.trim())return toast('Cole o texto do tratamento.');let cond=parseField(t,['Síndrome','Sindrome','Tratamento','Tratamiento'])||t.split('\n')[0]||'Tratamento novo';let drugNames=(parseField(t,['Fármacos','Farmacos','Medicamentos'])||'').split(',').map(x=>x.trim()).filter(Boolean);let ids=drugNames.map(n=>{let d=state.drugs.find(x=>norm(x.n).includes(norm(n))||norm(n).includes(norm(x.n)));return d?.id}).filter(Boolean);state.tx.unshift({id:'tx_'+uid(),cat:parseField(t,['Categoria'])||'Personalizado',cond,first:parseField(t,['Primeira linha','Primera línea','1ª linha'])||'Revisar protocolo.',scheme:parseField(t,['Esquema','Plano'])||t,mon:parseField(t,['Monitorização','Monitorización'])||'Monitorar resposta e segurança.',warn:parseField(t,['Alerta','Warning'])||'Validar institucionalmente.',drugs:ids});save();toast('Tratamento adicionado.');render()}
async function ocrImage(e){let f=e.target.files[0];if(!f)return;toast('Carregando OCR...');try{await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');let r=await Tesseract.recognize(f,'por+spa+eng');document.getElementById('labText').value=r.data.text||'';extractLabs();toast('OCR concluído.')}catch(err){toast('OCR falhou. Cole o texto manualmente.')}}
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector(`script[src="${src}"]`))return res();let s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.body.appendChild(s)})}
function extractLabs(){let t=val('labText');let defs=[['Hb',['hemoglobina','hb']],['Hto',['hematocrito','hematócrito','hto']],['Leuco',['leucocitos','leucócitos','wbc']],['Plaquetas',['plaquetas','plt']],['Creatinina',['creatinina','creat']],['Ureia',['ureia','urea','bun']],['Na+',['sodio','sódio','na ']],['K+',['potassio','potássio','k ']],['Glicose',['glicose','glucose','glicemia']],['PCR',['pcr','crp']],['INR',['inr','rni']],['Lactato',['lactato']]];let labs=[];defs.forEach(d=>{let line=t.split('\n').find(l=>d[1].some(a=>norm(l).includes(norm(a))));if(line){let m=line.replace(',','.').match(/[0-9]+(\.[0-9]+)?/);if(m)labs.push({k:d[0],v:m[0]})}});window.currentLabs=labs;document.getElementById('labResults').innerHTML=renderLabs(labs);toast(labs.length?`Extraídos ${labs.length} parâmetros.`:'Nenhum parâmetro reconhecido.')}
let recog=null;function toggleVoice(){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return toast('Reconhecimento de voz não disponível neste navegador.');let btn=document.getElementById('voiceBtn');if(recog){recog.stop();recog=null;btn?.classList.remove('voiceOn');return}recog=new SR();recog.lang='pt-BR';recog.interimResults=true;recog.continuous=false;let final='';recog.onresult=e=>{let txt='';for(let i=e.resultIndex;i<e.results.length;i++){let tr=e.results[i][0].transcript;if(e.results[i].isFinal)final+=tr+' ';else txt+=tr}let p=document.getElementById('voicePreview');if(p)p.textContent=(final+txt).trim()};recog.onend=()=>{let target=val('voiceTarget');let el=document.getElementById(target);if(el&&final.trim())el.value=(el.value?el.value+'\n':'')+final.trim();recog=null;btn?.classList.remove('voiceOn')};recog.start();btn?.classList.add('voiceOn')}
function report(id){let c=state.cases.find(x=>x.id==id);if(!c)return;let w=window.open('','_blank');w.document.write(`<html><head><title>Relatório MedCases</title><style>body{margin:0;background:#e5e7eb;font-family:Arial}.report{max-width:800px;margin:24px auto;background:white;padding:32px}.head{background:#064e3b;color:white;padding:28px;border-radius:20px}h1{margin:0}.sec{border:1px solid #e2e8f0;border-radius:16px;padding:14px;margin:12px 0}.sec h2{font-size:13px;text-transform:uppercase;color:#047857}.mini{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.box{background:#f8fafc;border-radius:12px;padding:8px}@media print{body{background:white}.report{margin:0;max-width:none}}</style></head><body><div class="report"><div class="head"><h1>MedCases — História Clínica</h1><p>${new Date().toLocaleString('pt-BR')} • ${esc(c.owner||'')}</p></div><div class="sec"><h2>Identificação</h2><p><b>Código:</b> ${esc(c.patientCode)} • <b>Idade:</b> ${esc(c.age)} • <b>Sexo:</b> ${esc(c.sex)} • <b>Peso:</b> ${esc(c.weight)} kg • <b>Leito:</b> ${esc(c.bed)}</p></div><div class="sec"><h2>Caso</h2><h3>${esc(c.title)}</h3><p><b>Diagnóstico:</b> ${esc(c.diagnosis)}</p><p>${esc(c.history).replace(/\n/g,'<br>')}</p></div><div class="sec"><h2>Tratamento</h2><p>${esc(c.treatment).replace(/\n/g,'<br>')}</p></div><div class="sec"><h2>Exames</h2><p>${esc(c.exams).replace(/\n/g,'<br>')}</p>${renderLabs(c.labs||[])}</div><div class="sec"><h2>Evoluções</h2>${(c.evolutions||[]).map(ev=>`<div class="sec"><b>${esc(ev.day||'Evolução')} • ${esc(ev.date)}</b><p>${esc([ev.s,ev.v,ev.e,ev.l,ev.c,ev.r].filter(Boolean).join('\n')).replace(/\n/g,'<br>')}</p></div>`).join('')||'Sem evoluções.'}</div></div><script>window.onload=()=>setTimeout(()=>window.print(),300)<\/script></body></html>`);w.document.close()}
function exportBackup(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='medcases-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Backup exportado.')}
function importBackup(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result);if(!data.drugs||!data.cases)throw 0;state=data;save();toast('Backup importado.');render()}catch(err){toast('Arquivo inválido.')}};r.readAsText(f)}
function render(){document.getElementById('root').innerHTML=app()}render();
</script>
