<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>MedCases Pro | Gestão Clínica</title>
  <meta name="theme-color" content="#062015" />
  <style>
    :root {
      --bg: #f4f7f5;
      --card: #ffffff;
      --ink: #0f1a16;
      --muted: #64746b;
      --line: rgba(15, 35, 27, 0.08);
      --green: #10b981;
      --green-dark: #065f46;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --radius: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      background: var(--bg); 
      color: var(--ink); 
      line-height: 1.5;
      padding-bottom: 90px;
    }

    .app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--bg); }

    /* Header */
    .top { 
      position: sticky; top: 0; z-index: 100; 
      background: rgba(255, 255, 255, 0.8); 
      backdrop-filter: blur(12px); 
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .top-in { display: flex; justify-content: space-between; align-items: center; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo { 
      width: 40px; height: 40px; border-radius: 12px; 
      background: linear-gradient(135deg, var(--green-dark), var(--green)); 
      display: grid; place-items: center; color: white; font-weight: 900;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .brand h1 { font-size: 18px; margin: 0; letter-spacing: -0.02em; }
    .brand p { font-size: 11px; margin: 0; color: var(--muted); font-weight: 600; }

    /* Hero & Cards */
    main { padding: 16px; }
    .hero { 
      background: linear-gradient(135deg, #062015 0%, #065f46 100%);
      border-radius: 24px; padding: 24px; color: white; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .hero h2 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.03em; }
    .hero p { font-size: 14px; opacity: 0.9; margin: 0; }
    
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 16px; }
    .stat { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 12px; text-align: center; }
    .stat b { display: block; font-size: 18px; }
    .stat span { font-size: 9px; text-transform: uppercase; opacity: 0.8; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { 
      background: var(--card); border: 1px solid var(--line); padding: 16px;
      border-radius: var(--radius); cursor: pointer; transition: transform 0.2s;
    }
    .card:active { transform: scale(0.97); }
    .ico { font-size: 24px; margin-bottom: 8px; }
    .card h3 { font-size: 15px; margin: 0; }
    .card p { font-size: 12px; color: var(--muted); margin: 4px 0 0; }

    /* Forms & Inputs */
    .panel { background: var(--card); border-radius: var(--radius); border: 1px solid var(--line); margin-top: 16px; overflow: hidden; }
    .panel-h { padding: 16px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .panel-h h2 { font-size: 17px; margin: 0; }
    .panel-b { padding: 16px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input, textarea, select { 
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; 
      font-size: 14px; outline: none; transition: border 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--green); ring: 2px var(--green); }
    
    .btn { 
      padding: 12px 20px; border-radius: 14px; border: none; font-weight: 700; 
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--ink); color: white; width: 100%; }
    .btn-light { background: #f1f5f9; color: var(--ink); font-size: 13px; }
    .btn-red { background: #fee2e2; color: var(--red); }

    /* Tabs Navigation */
    .tabs { 
      position: fixed; bottom: 0; left: 0; right: 0; 
      background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
      border-top: 1px solid var(--line); display: flex; justify-content: space-around;
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .tab { background: none; border: none; color: var(--muted); font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .tab.active { color: var(--green); }
    .tab i { font-size: 20px; font-style: normal; }

    /* List Items */
    .item { padding: 12px; border: 1px solid var(--line); border-radius: 16px; margin-bottom: 8px; cursor: pointer; position: relative; }
    .item.active { border-color: var(--green); background: #f0fdf4; }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 800; background: #e2e8f0; margin-right: 4px; }
    .tag.danger { background: #fee2e2; color: var(--red); }

    /* Toast */
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; padding: 12px 24px; border-radius: 50px; font-size: 13px; z-index: 1000; box-shadow: var(--shadow); }

    /* Helpers */
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    .hidden { display: none; }
    .voice-pulse { animation: pulse 1.5s infinite; background: var(--red) !important; color: white !important; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    @media print { .tabs, .top, .no-print { display: none !important; } body { padding: 0; background: white; } }
  </style>
</head>
<body>

<div id="root"></div>

<script>
// --- BANCO DE DADOS E ESTADO ---
const DB_NAME = 'MedCases_Pro_Storage';
const INITIAL_DRUGS = [
  { id: 'furo1', n: 'Furosemida', cat: 'Cardio', cls: 'Diurético de Alça', dose: '20-40mg IV/VO', warn: 'Checar K+ e PA.', ea: ['Hipocalemia', 'Hipotensão'] },
  { id: 'norad1', n: 'Noradrenalina', cat: 'UTI', cls: 'Vasopressor', dose: '0.05-1.0 mcg/kg/min', warn: 'Acesso central obrigatório.', ea: ['Arritmia', 'Isquemia periférica'] },
  { id: 'ceft1', n: 'Ceftriaxona', cat: 'ATB', cls: 'Cefalosporina 3ªG', dose: '1-2g IV q24h', warn: 'Ajuste renal não necessário.', ea: ['Diarreia', 'Rash'] }
];

let state = {
  user: JSON.parse(localStorage.getItem('mc_user')) || null,
  tab: 'home',
  cases: JSON.parse(localStorage.getItem('mc_cases')) || [],
  drugs: JSON.parse(localStorage.getItem('mc_drugs')) || INITIAL_DRUGS,
  selCaseId: null,
  editingCase: null,
  toast: null,
  isRecording: false
};

// --- FUNÇÕES DE UTILIDADE ---
const save = () => {
  localStorage.setItem('mc_cases', JSON.stringify(state.cases));
  localStorage.setItem('mc_drugs', JSON.stringify(state.drugs));
  localStorage.setItem('mc_user', JSON.stringify(state.user));
};

const showToast = (msg) => {
  state.toast = msg; render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
};

const navigate = (tab) => { state.tab = tab; render(); window.scrollTo(0,0); };

const getSelCase = () => state.cases.find(c => c.id === state.selCaseId) || state.cases[0];

// --- LÓGICA DE NEGÓCIO ---
const handleLogin = (e) => {
  e.preventDefault();
  state.user = { name: document.getElementById('u_name').value, role: 'Médico' };
  save(); render();
};

const saveCase = (e) => {
  e.preventDefault();
  const formData = {
    id: state.editingCase || 'c_' + Date.now(),
    title: document.getElementById('c_title').value,
    patient: document.getElementById('c_patient').value,
    age: document.getElementById('c_age').value,
    dx: document.getElementById('c_dx').value,
    history: document.getElementById('c_hx').value,
    plan: document.getElementById('c_plan').value,
    updated: new Date().toISOString()
  };

  if (state.editingCase) {
    state.cases = state.cases.map(c => c.id === state.editingCase ? formData : c);
  } else {
    state.cases.unshift(formData);
  }
  
  state.editingCase = null;
  state.selCaseId = formData.id;
  save(); showToast('Caso clínico salvo!'); navigate('home');
};

// --- RECONHECIMENTO DE VOZ ---
const startVoice = (targetId) => {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Speech) return showToast('Voz não suportada neste navegador.');

  const recognition = new Speech();
  recognition.lang = 'pt-BR';
  state.isRecording = true; render();

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    document.getElementById(targetId).value += (document.getElementById(targetId).value ? ' ' : '') + text;
    state.isRecording = false; render();
  };
  
  recognition.onerror = () => { state.isRecording = false; render(); };
  recognition.start();
};

// --- INTERFACE (UI) ---
const LoginView = () => `
  <div style="padding:40px 20px; text-align:center;">
    <div class="logo" style="margin: 0 auto 20px; width:60px; height:60px; font-size:24px;">✚</div>
    <h2>MedCases Pro</h2>
    <p style="color:var(--muted)">Sua central de condutas e casos</p>
    <form onsubmit="handleLogin(event)" style="margin-top:30px; text-align:left;">
      <div class="field">
        <label>Nome do Profissional</label>
        <input id="u_name" required placeholder="Ex: Dr. Silva">
      </div>
      <button class="btn btn-primary">Entrar no App</button>
    </form>
  </div>
`;

const HomeView = () => {
  const cases = state.cases;
  return `
    <section class="hero">
      <h2>Olá, ${state.user.name}</h2>
      <p>Você tem ${cases.length} casos ativos hoje.</p>
      <div class="stats">
        <div class="stat"><b>${cases.length}</b><span>Casos</span></div>
        <div class="stat"><b>${state.drugs.length}</b><span>Fármacos</span></div>
        <div class="stat"><b>0</b><span>Plantões</span></div>
        <div class="stat"><b>100%</b><span>Offline</span></div>
      </div>
    </section>

    <div class="grid">
      <div class="card" onclick="state.editingCase=null; navigate('edit')">
        <div class="ico">📝</div>
        <h3>Novo Caso</h3>
        <p>Admitir paciente</p>
      </div>
      <div class="card" onclick="navigate('drugs')">
        <div class="ico">💊</div>
        <h3>Drogas</h3>
        <p>Doses e Alertas</p>
      </div>
    </div>

    <div class="panel">
      <div class="panel-h"><h2>Pacientes Recentes</h2></div>
      <div class="panel-b">
        ${cases.length ? cases.map(c => `
          <div class="item" onclick="state.selCaseId='${c.id}'; navigate('details')">
            <b>${c.patient}</b>
            <p style="font-size:12px">${c.title} • ${c.age} anos</p>
          </div>
        `).join('') : '<p style="text-align:center; color:var(--muted)">Nenhum caso salvo.</p>'}
      </div>
    </div>
  `;
};

const DetailsView = () => {
  const c = getSelCase();
  if (!c) return navigate('home');
  return `
    <div class="panel">
      <div class="panel-h">
        <h2>${c.patient}</h2>
        <button class="btn btn-light" onclick="state.editingCase='${c.id}'; navigate('edit')">Editar</button>
      </div>
      <div class="panel-b">
        <p><b>Diagnóstico:</b> ${c.dx}</p>
        <hr style="border:0; border-top:1px solid var(--line); margin:16px 0;">
        <p><b>História:</b><br>${c.history}</p>
        <div style="background:#f8fafc; padding:12px; border-radius:12px; margin-top:12px;">
          <b style="color:var(--green-dark)">Conduta / Plano:</b><br>${c.plan}
        </div>
        <button class="btn btn-red" style="margin-top:20px; width:100%" onclick="deleteCase('${c.id}')">Excluir Caso</button>
      </div>
    </div>
  `;
};

const EditView = () => {
  const c = state.editingCase ? state.cases.find(x => x.id === state.editingCase) : {};
  return `
    <div class="panel">
      <div class="panel-h"><h2>${state.editingCase ? 'Editar Caso' : 'Nova Admissão'}</h2></div>
      <div class="panel-b">
        <form onsubmit="saveCase(event)">
          <div class="field"><label>Iniciais / Nome do Paciente</label><input id="c_patient" value="${c.patient || ''}" required></div>
          <div class="row">
            <div class="field"><label>Idade</label><input id="c_age" type="number" value="${c.age || ''}"></div>
            <div class="field"><label>Hipótese/Título</label><input id="c_title" value="${c.title || ''}" placeholder="Ex: IC Descompensada"></div>
          </div>
          <div class="field"><label>Diagnóstico Principal</label><input id="c_dx" value="${c.dx || ''}"></div>
          
          <div class="field">
            <label style="display:flex; justify-content:space-between">
              História Clínica 
              <span style="color:var(--blue); cursor:pointer" onclick="startVoice('c_hx')">🎙️ Ditar</span>
            </label>
            <textarea id="c_hx" rows="4">${c.history || ''}</textarea>
          </div>

          <div class="field">
            <label style="display:flex; justify-content:space-between">
              Plano Terapêutico
              <span style="color:var(--blue); cursor:pointer" onclick="startVoice('c_plan')">🎙️ Ditar</span>
            </label>
            <textarea id="c_plan" rows="4">${c.plan || ''}</textarea>
          </div>

          <button class="btn btn-primary ${state.isRecording ? 'voice-pulse' : ''}">
            ${state.isRecording ? 'Ouvindo...' : 'Salvar Registro Clínico'}
          </button>
        </form>
      </div>
    </div>
  `;
};

const DrugView = () => `
  <div class="panel">
    <div class="panel-h"><h2>Guia de Fármacos</h2></div>
    <div class="panel-b">
      <input type="text" placeholder="Buscar droga..." style="margin-bottom:12px" oninput="filterDrugs(this.value)">
      <div id="drugList">
        ${state.drugs.map(d => `
          <div class="item">
            <span class="tag">${d.cat}</span> <b>${d.n}</b>
            <p style="font-size:12px; margin:4px 0;">Dose: ${d.dose}</p>
            <p class="tag danger" style="display:inline-block; margin:0">⚠️ ${d.warn}</p>
          </div>
        `).join('')}
      </div>
    </div>
  </div>
`;

// --- CORE RENDERING ---
const deleteCase = (id) => {
  if(confirm('Deseja excluir este caso permanentemente?')) {
    state.cases = state.cases.filter(c => c.id !== id);
    save(); navigate('home');
  }
};

const render = () => {
  const root = document.getElementById('root');
  if (!state.user) { root.innerHTML = LoginView(); return; }

  let content = '';
  switch(state.tab) {
    case 'home': content = HomeView(); break;
    case 'edit': content = EditView(); break;
    case 'details': content = DetailsView(); break;
    case 'drugs': content = DrugView(); break;
  }

  root.innerHTML = `
    <div class="app">
      <header class="top">
        <div class="top-in">
          <div class="brand">
            <div class="logo">✚</div>
            <div><h1>MedCases Pro</h1><p>${state.user.name}</p></div>
          </div>
          <button class="btn btn-light" onclick="localStorage.clear(); location.reload();">Sair</button>
        </div>
      </header>
      <main>${content}</main>
      <nav class="tabs">
        <button class="tab ${state.tab==='home'?'active':''}" onclick="navigate('home')"><i>🏠</i>Início</button>
        <button class="tab ${state.tab==='edit'?'active':''}" onclick="state.editingCase=null; navigate('edit')"><i>➕</i>Novo</button>
        <button class="tab ${state.tab==='drugs'?'active':''}" onclick="navigate('drugs')"><i>💊</i>Drogas</button>
      </nav>
      ${state.toast ? `<div class="toast">${state.toast}</div>` : ''}
    </div>
  `;
};

// Inicialização
render();
</script>
</body>
</html>
