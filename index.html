<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedCases</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    function cx(...classes) {
      return classes.filter(Boolean).join(" ");
    }

    const seedCases = [
      {
        id: "c-001",
        patientCode: "PX-1042",
        age: "68",
        sex: "Masculino",
        weight: "78",
        title: "Insuficiência cardíaca descompensada",
        diagnosis: "IC com fração de ejeção reduzida.",
        treatment: "Oxigênio se necessário, diurético IV, controle de eletrólitos e otimização da terapia de IC.",
        priority: "Alto",
        createdAt: new Date().toISOString(),
      },
    ];

    const drugDatabase = [
      {
        id: "furosemida",
        name: "Furosemida",
        className: "Diurético de alça",
        route: "VO / IV",
        dose: "20–40 mg IV inicial; ajustar conforme congestão, diurese, PA e função renal.",
        warning: "Controlar K+, Mg2+, creatinina, PA e balanço hídrico. Hipocalemia aumenta risco de intoxicação digitálica.",
      },
      {
        id: "dobutamina",
        name: "Dobutamina",
        className: "Inotrópico beta-1",
        route: "IV em bomba",
        dose: "2,5–20 mcg/kg/min titulada por resposta hemodinâmica.",
        warning: "Usar em ambiente monitorizado. Risco de taquiarritmia e isquemia.",
      },
      {
        id: "noradrenalina",
        name: "Noradrenalina",
        className: "Vasopressor alfa-1 predominante",
        route: "IV em bomba",
        dose: "0,05–1 mcg/kg/min titulada para alvo de PAM.",
        warning: "Preferir acesso central. Extravasamento pode causar necrose.",
      },
      {
        id: "morfina",
        name: "Morfina",
        className: "Opioide forte",
        route: "VO / IV / SC",
        dose: "2–10 mg IV titulados conforme dor, tolerância e resposta clínica.",
        warning: "Monitorar nível de consciência, FR e SatO2. Antídoto: naloxona.",
      },
      {
        id: "ceftriaxona",
        name: "Ceftriaxona",
        className: "Cefalosporina de 3ª geração",
        route: "IV / IM",
        dose: "1–2 g IV/IM a cada 24h conforme foco e gravidade.",
        warning: "Checar alergia a beta-lactâmicos e colher culturas quando indicado.",
      },
      {
        id: "digoxina",
        name: "Digoxina",
        className: "Glicosídeo cardíaco",
        route: "VO / IV",
        dose: "0,125–0,25 mg/dia; individualizar por idade, rim e nível sérico.",
        warning: "Janela terapêutica estreita. Hipocalemia, DRC e amiodarona aumentam toxicidade.",
      },
      {
        id: "amiodarona",
        name: "Amiodarona",
        className: "Antiarrítmico classe III",
        route: "VO / IV",
        dose: "Dose depende da arritmia. Manutenção comum: 100–200 mg/dia após carga.",
        warning: "Monitorar tireoide, fígado, pulmão, ECG e interações com varfarina/digoxina.",
      },
      {
        id: "enoxaparina",
        name: "Enoxaparina",
        className: "HBPM / anticoagulante",
        route: "SC",
        dose: "Tratamento: 1 mg/kg 12/12h em muitos protocolos.",
        warning: "Ajustar se ClCr <30 mL/min. Avaliar Hb, plaquetas, rim e sangramento.",
      },
    ];

    const treatmentDatabase = [
      {
        id: "choque-cardiogenico",
        title: "Choque cardiogênico",
        problem: "↓ contratilidade e ↓ débito cardíaco.",
        treatment: "Dobutamina. Se hipotenso: noradrenalina + dobutamina.",
        alert: "Monitorar PAM, FC, ECG, lactato, diurese e congestão.",
      },
      {
        id: "anafilaxia",
        title: "Choque anafilático",
        problem: "Vasodilatação, broncoespasmo e edema de via aérea.",
        treatment: "Adrenalina IM é primeira linha. Suporte de via aérea, O2 e volume.",
        alert: "Não atrasar adrenalina. Anti-histamínico/corticoide não substituem adrenalina.",
      },
      {
        id: "tvp-tep",
        title: "TVP / TEP estável",
        problem: "Trombo venoso com risco embolígeno.",
        treatment: "DOAC se estável e sem contraindicação; HBPM/HNF em situações especiais.",
        alert: "Gestação, IR grave, cirurgia/trombólise ou instabilidade mudam a escolha.",
      },
    ];

    function App() {
      const [tab, setTab] = useState("home");
      const [cases, setCases] = useState(seedCases);
      const [search, setSearch] = useState("");
      const [drugSearch, setDrugSearch] = useState("");
      const [form, setForm] = useState({
        patientCode: "",
        age: "",
        sex: "Masculino",
        weight: "",
        title: "",
        diagnosis: "",
        treatment: "",
        priority: "Moderado",
      });

      const filteredCases = useMemo(() => {
        const q = search.toLowerCase().trim();
        return cases.filter((item) => !q || [item.patientCode, item.title, item.diagnosis, item.treatment].join(" ").toLowerCase().includes(q));
      }, [cases, search]);

      const filteredDrugs = useMemo(() => {
        const q = drugSearch.toLowerCase().trim();
        return drugDatabase.filter((drug) => !q || [drug.name, drug.className, drug.route, drug.warning].join(" ").toLowerCase().includes(q));
      }, [drugSearch]);

      function saveCase(e) {
        e.preventDefault();
        if (!form.title.trim()) return alert("Coloque pelo menos o título do caso.");
        const newCase = { ...form, id: crypto.randomUUID(), createdAt: new Date().toISOString() };
        setCases([newCase, ...cases]);
        setForm({ patientCode: "", age: "", sex: "Masculino", weight: "", title: "", diagnosis: "", treatment: "", priority: "Moderado" });
        setTab("history");
      }

      return (
        <div className="min-h-screen pb-24 text-slate-950">
          <header className="sticky top-0 z-20 border-b border-emerald-100 bg-white/85 backdrop-blur-xl">
            <div className="mx-auto flex max-w-md items-center justify-between px-4 py-3">
              <div className="flex items-center gap-3">
                <div className="grid h-11 w-11 place-items-center rounded-2xl bg-emerald-950 text-white shadow-lg">✚</div>
                <div>
                  <h1 className="text-lg font-black tracking-tight">MedCases</h1>
                  <p className="text-xs font-semibold text-slate-500">Casos • Fármacos • Tratamentos</p>
                </div>
              </div>
              <span className="rounded-full bg-emerald-50 px-3 py-1 text-xs font-black text-emerald-700">HTML</span>
            </div>
          </header>

          <main className="mx-auto max-w-md space-y-4 px-4 pt-4">
            {tab === "home" && <Home cases={cases} setTab={setTab} />}
            {tab === "new" && <NewCase form={form} setForm={setForm} saveCase={saveCase} />}
            {tab === "history" && <History search={search} setSearch={setSearch} filteredCases={filteredCases} />}
            {tab === "drugs" && <Drugs drugSearch={drugSearch} setDrugSearch={setDrugSearch} filteredDrugs={filteredDrugs} />}
            {tab === "treatments" && <Treatments />}
          </main>

          <nav className="fixed inset-x-0 bottom-0 z-30 border-t border-emerald-100 bg-white/90 backdrop-blur-xl">
            <div className="mx-auto grid max-w-md grid-cols-5 gap-1 px-3 py-2">
              <NavButton active={tab === "home"} onClick={() => setTab("home")} label="Início" icon="⌂" />
              <NavButton active={tab === "new"} onClick={() => setTab("new")} label="Caso" icon="+" />
              <NavButton active={tab === "history"} onClick={() => setTab("history")} label="Hist." icon="▤" />
              <NavButton active={tab === "drugs"} onClick={() => setTab("drugs")} label="Fárm." icon="Rx" />
              <NavButton active={tab === "treatments"} onClick={() => setTab("treatments")} label="TTO" icon="Tx" />
            </div>
          </nav>
        </div>
      );
    }

    function Home({ cases, setTab }) {
      return (
        <>
          <section className="overflow-hidden rounded-[2rem] bg-gradient-to-br from-emerald-950 via-slate-950 to-emerald-700 p-5 text-white shadow-xl">
            <p className="text-xs font-black uppercase tracking-[.18em] text-emerald-200">Clinical workspace</p>
            <h2 className="mt-2 text-4xl font-black leading-none tracking-tight">MedCases</h2>
            <p className="mt-2 text-sm text-emerald-50/80">Versão HTML direta para GitHub Pages, sem build, sem Vite e sem erro de index.tsx.</p>
            <div className="mt-5 grid grid-cols-3 gap-2">
              <Stat label="Casos" value={cases.length} />
              <Stat label="Fármacos" value={drugDatabase.length} />
              <Stat label="TTO" value={treatmentDatabase.length} />
            </div>
          </section>

          <section className="grid grid-cols-2 gap-3">
            <Action title="Novo caso" text="Cadastrar paciente" icon="+" onClick={() => setTab("new")} />
            <Action title="Fármacos" text="Dose e alertas" icon="Rx" onClick={() => setTab("drugs")} />
            <Action title="Histórico" text="Casos salvos" icon="▤" onClick={() => setTab("history")} />
            <Action title="Tratamentos" text="Algoritmos rápidos" icon="Tx" onClick={() => setTab("treatments")} />
          </section>
        </>
      );
    }

    function NewCase({ form, setForm, saveCase }) {
      function update(field, value) {
        setForm({ ...form, [field]: value });
      }
      return (
        <Panel title="Novo caso" subtitle="Cadastro clínico compacto">
          <form onSubmit={saveCase} className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
              <Input label="Código" value={form.patientCode} onChange={(e) => update("patientCode", e.target.value)} placeholder="PX-001" />
              <Input label="Idade" value={form.age} onChange={(e) => update("age", e.target.value)} placeholder="anos" />
              <Input label="Sexo" value={form.sex} onChange={(e) => update("sex", e.target.value)} placeholder="Masculino" />
              <Input label="Peso" value={form.weight} onChange={(e) => update("weight", e.target.value)} placeholder="kg" />
            </div>
            <Input label="Título" value={form.title} onChange={(e) => update("title", e.target.value)} placeholder="Ex: IC descompensada" />
            <Textarea label="Diagnóstico" value={form.diagnosis} onChange={(e) => update("diagnosis", e.target.value)} />
            <Textarea label="Tratamento / conduta" value={form.treatment} onChange={(e) => update("treatment", e.target.value)} />
            <button className="h-12 w-full rounded-2xl bg-emerald-700 font-black text-white shadow-lg">Salvar caso</button>
          </form>
        </Panel>
      );
    }

    function History({ search, setSearch, filteredCases }) {
      return (
        <Panel title="Histórico" subtitle="Casos salvos no navegador">
          <input className="mb-3 h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar paciente, diagnóstico..." />
          <div className="space-y-3">
            {filteredCases.map((item) => <CaseCard key={item.id} item={item} />)}
            {!filteredCases.length && <p className="rounded-2xl border border-dashed border-slate-200 p-5 text-center text-sm text-slate-500">Nenhum caso encontrado.</p>}
          </div>
        </Panel>
      );
    }

    function Drugs({ drugSearch, setDrugSearch, filteredDrugs }) {
      return (
        <Panel title="Fármacos" subtitle="Base rápida com doses e alertas">
          <input className="mb-3 h-12 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" value={drugSearch} onChange={(e) => setDrugSearch(e.target.value)} placeholder="Buscar: furosemida, morfina, ceftriaxona..." />
          <div className="space-y-3">
            {filteredDrugs.map((drug) => <DrugCard key={drug.id} drug={drug} />)}
          </div>
        </Panel>
      );
    }

    function Treatments() {
      return (
        <Panel title="Tratamentos" subtitle="Algoritmos clínicos rápidos">
          <div className="space-y-3">
            {treatmentDatabase.map((item) => (
              <article key={item.id} className="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm">
                <h3 className="text-lg font-black tracking-tight">{item.title}</h3>
                <p className="mt-2 text-sm text-slate-600"><b>Problema:</b> {item.problem}</p>
                <p className="mt-2 text-sm text-slate-600"><b>TTO:</b> {item.treatment}</p>
                <p className="mt-3 rounded-2xl bg-amber-50 p-3 text-xs font-bold text-amber-900">⚠ {item.alert}</p>
              </article>
            ))}
          </div>
        </Panel>
      );
    }

    function CaseCard({ item }) {
      return (
        <article className="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm">
          <div className="flex items-start justify-between gap-3">
            <div>
              <h3 className="font-black tracking-tight">{item.title}</h3>
              <p className="text-xs font-semibold text-slate-500">{item.patientCode || "Sem código"} • {item.age || "—"} anos • {item.sex || "—"}</p>
            </div>
            <span className="rounded-full bg-emerald-50 px-3 py-1 text-xs font-black text-emerald-700">{item.priority}</span>
          </div>
          <p className="mt-3 text-sm text-slate-600"><b>Dx:</b> {item.diagnosis || "—"}</p>
          <p className="mt-2 text-sm text-slate-600"><b>Conduta:</b> {item.treatment || "—"}</p>
        </article>
      );
    }

    function DrugCard({ drug }) {
      return (
        <article className="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm">
          <div className="flex items-start justify-between gap-3">
            <div>
              <h3 className="font-black tracking-tight">{drug.name}</h3>
              <p className="text-xs font-semibold text-slate-500">{drug.className} • {drug.route}</p>
            </div>
            <span className="rounded-full bg-slate-950 px-3 py-1 text-xs font-black text-white">Rx</span>
          </div>
          <p className="mt-3 rounded-2xl bg-emerald-50 p-3 text-sm font-bold text-emerald-950">{drug.dose}</p>
          <p className="mt-2 rounded-2xl bg-amber-50 p-3 text-xs font-bold text-amber-900">⚠ {drug.warning}</p>
        </article>
      );
    }

    function Panel({ title, subtitle, children }) {
      return (
        <section className="rounded-[2rem] border border-slate-200 bg-white p-4 shadow-sm">
          <h2 className="text-xl font-black tracking-tight">{title}</h2>
          {subtitle && <p className="mb-4 text-sm font-semibold text-slate-500">{subtitle}</p>}
          {children}
        </section>
      );
    }

    function Input({ label, ...props }) {
      return (
        <label className="block">
          <span className="mb-1 block text-[11px] font-black uppercase tracking-[.14em] text-slate-500">{label}</span>
          <input {...props} className="h-11 w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
        </label>
      );
    }

    function Textarea({ label, ...props }) {
      return (
        <label className="block">
          <span className="mb-1 block text-[11px] font-black uppercase tracking-[.14em] text-slate-500">{label}</span>
          <textarea {...props} className="min-h-[90px] w-full rounded-2xl border border-slate-200 bg-slate-50 p-3 outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
        </label>
      );
    }

    function Action({ title, text, icon, onClick }) {
      return (
        <button onClick={onClick} className="rounded-3xl border border-slate-200 bg-white p-4 text-left shadow-sm active:scale-[.99]">
          <div className="mb-3 grid h-11 w-11 place-items-center rounded-2xl bg-slate-950 text-sm font-black text-white">{icon}</div>
          <p className="font-black tracking-tight">{title}</p>
          <p className="text-xs font-semibold text-slate-500">{text}</p>
        </button>
      );
    }

    function Stat({ label, value }) {
      return (
        <div className="rounded-2xl bg-white/10 p-3 text-center ring-1 ring-white/10">
          <p className="text-2xl font-black">{value}</p>
          <p className="text-[10px] font-black uppercase tracking-[.14em] text-emerald-100/80">{label}</p>
        </div>
      );
    }

    function NavButton({ active, onClick, label, icon }) {
      return (
        <button onClick={onClick} className={cx("rounded-2xl px-2 py-2 text-center transition", active ? "bg-emerald-950 text-white" : "text-slate-500") }>
          <div className="text-sm font-black leading-none">{icon}</div>
          <div className="mt-1 text-[10px] font-black">{label}</div>
        </button>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
